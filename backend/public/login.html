<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Shriram Digital</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
background:linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
url('https://images.unsplash.com/photo-1521791136064-7986c2920216');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:100%;
max-width:400px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:40px;
border-radius:12px;
color:white;
text-align:center;
}

.logo{
margin-bottom:20px;
font-size:22px;
font-weight:600;
}

h1{
margin-bottom:25px;
font-weight:600;
}

.input-box{
width:100%;
margin-bottom:15px;
}

.input-box input{
width:100%;
padding:14px;
border:none;
border-radius:8px;
outline:none;
font-size:14px;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
margin-top:10px;
}

.btn:hover{
background:#16a34a;
}

.extra{
margin-top:15px;
font-size:14px;
}

.extra a{
color:#22c55e;
text-decoration:none;
}

.footer{
margin-top:20px;
font-size:12px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
Shriram Digital
</div>

<h1>Login Account</h1>

<div class="input-box">
<input type="text" placeholder="Enter User ID">
</div>

<div class="input-box">
<input type="password" placeholder="Enter Password">
</div>

<button class="btn" onclick="login()">
Login
</button>

<div class="extra">
<a href="#">Forgot Password?</a>
</div>

<div class="extra">
Don’t have an account?
<a href="register.html">Register</a>
</div>

<div class="footer">
© 2026 Shriram Digital
</div>

</div>

<script>

function login(){
alert("Login Successful (Demo)");
window.location.href = "dashboard.html";
}

</script>

</body>
</html>
